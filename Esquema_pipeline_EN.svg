<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1400" height="820" fill="#fafaf8"/>

  <!-- ═══════════════════════════════════════════════
       LEFT PANEL — PROCESSING
  ════════════════════════════════════════════════ -->

  <!-- PROCESSING vertical label -->
  <rect x="8" y="90" width="22" height="620" rx="5" fill="#e8724a"/>
  <text x="19" y="400" fill="white" font-size="13" font-weight="bold" text-anchor="middle" transform="rotate(-90,19,400)">PROCESSING</text>

  <!-- Red dashed border around processing steps -->
  <rect x="32" y="85" width="390" height="630" rx="10" fill="none" stroke="#e8724a" stroke-width="2" stroke-dasharray="7,4"/>

  <!-- pipe_SV.sh box -->
  <rect x="50" y="95" width="160" height="30" rx="6" fill="#b8d9b0"/>
  <text x="130" y="115" fill="#2d6e2d" font-size="13" font-weight="bold" text-anchor="middle">pipe_SV.sh</text>

  <!-- Command box -->
  <rect x="50" y="132" width="260" height="24" rx="4" fill="#3a3a3a"/>
  <text x="180" y="148" fill="#7ec87e" font-size="11" font-family="Courier New" text-anchor="middle">./pipe_SV.sh /path/to/directory</text>

  <!-- Input requirements box -->
  <rect x="270" y="90" width="140" height="110" rx="8" fill="#d4c5a0" stroke="#b8a070" stroke-width="1.5"/>
  <text x="340" y="108" fill="#5a4500" font-size="11" font-weight="bold" text-anchor="middle">Input directory</text>
  <text x="340" y="122" fill="#5a4500" font-size="11" font-weight="bold" text-anchor="middle">requirements</text>
  <!-- Manta -->
  <rect x="278" y="128" width="62" height="20" rx="3" fill="#c8a86e"/>
  <text x="309" y="142" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Manta</text>
  <text x="355" y="141" fill="#5a4500" font-size="10" text-anchor="start">Contains VCF</text>
  <!-- GRIDSS -->
  <rect x="278" y="152" width="62" height="20" rx="3" fill="#c8a86e"/>
  <text x="309" y="166" fill="white" font-size="10" font-weight="bold" text-anchor="middle">GRIDSS</text>
  <text x="355" y="165" fill="#5a4500" font-size="10" text-anchor="start">Contains VCF</text>
  <!-- delly -->
  <rect x="278" y="176" width="62" height="20" rx="3" fill="#c8a86e"/>
  <text x="309" y="190" fill="white" font-size="10" font-weight="bold" text-anchor="middle">delly</text>
  <text x="355" y="189" fill="#5a4500" font-size="10" text-anchor="start">Contains BCF</text>

  <!-- Step circles and script rows -->
  <!-- Step 1 -->
  <circle cx="60" cy="195" r="13" fill="#3a6abd"/>
  <text x="60" y="200" fill="white" font-size="12" font-weight="bold" text-anchor="middle">1</text>
  <rect x="78" y="182" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="199" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">procesado_inicial.sh</text>
  <text x="88" y="217" fill="#333" font-size="10">• bcftools view: converts .bcf → .vcf</text>
  <text x="88" y="229" fill="#333" font-size="10">• Splits variants into PASS / No_PASS dirs</text>

  <!-- Step 2 -->
  <circle cx="60" cy="258" r="13" fill="#3a6abd"/>
  <text x="60" y="263" fill="white" font-size="12" font-weight="bold" text-anchor="middle">2</text>
  <rect x="78" y="245" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="262" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">separar_portiposM.py</text>
  <text x="88" y="280" fill="#333" font-size="10">Splits Manta_PASS files by SV type</text>

  <!-- Step 3 -->
  <circle cx="60" cy="308" r="13" fill="#c8a030"/>
  <text x="60" y="313" fill="white" font-size="12" font-weight="bold" text-anchor="middle">3</text>
  <rect x="78" y="295" width="130" height="24" rx="5" fill="#e8e0c0"/>
  <text x="143" y="312" fill="#7a5500" font-size="12" font-weight="bold" text-anchor="middle">vcf2bed.sh</text>
  <text x="88" y="330" fill="#333" font-size="10">vcf2bed &lt; .vcf &gt; .bed — converts all VCFs to BED</text>

  <!-- Step 4 -->
  <circle cx="60" cy="358" r="13" fill="#3a6abd"/>
  <text x="60" y="363" fill="white" font-size="12" font-weight="bold" text-anchor="middle">4</text>
  <rect x="78" y="345" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="362" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">delly_processing.py</text>
  <text x="88" y="380" fill="#333" font-size="10">Formats each .bed by SV type (homogenizes format)</text>

  <!-- Step 5 -->
  <circle cx="60" cy="408" r="13" fill="#3a6abd"/>
  <text x="60" y="413" fill="white" font-size="12" font-weight="bold" text-anchor="middle">5</text>
  <rect x="78" y="395" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="412" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">separar_BND_Manta.py</text>
  <text x="88" y="430" fill="#333" font-size="10">Classifies BND as Translocation or Inversion</text>
  <text x="88" y="442" fill="#333" font-size="10">based on mapping chromosome</text>

  <!-- Step 6 -->
  <circle cx="60" cy="470" r="13" fill="#3a6abd"/>
  <text x="60" y="475" fill="white" font-size="12" font-weight="bold" text-anchor="middle">6</text>
  <rect x="78" y="457" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="474" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">pre_processing_Manta2.py</text>
  <text x="88" y="492" fill="#333" font-size="10">Formats each Manta .bed by SV type</text>

  <!-- Step 7 -->
  <circle cx="60" cy="518" r="13" fill="#3a6abd"/>
  <text x="60" y="523" fill="white" font-size="12" font-weight="bold" text-anchor="middle">7</text>
  <rect x="78" y="505" width="192" height="24" rx="5" fill="#b8d9b0"/>
  <text x="174" y="522" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">GridssVariantAnnotation.R</text>
  <!-- R badge -->
  <rect x="272" y="505" width="20" height="24" rx="3" fill="#276dc3"/>
  <text x="282" y="522" fill="white" font-size="11" font-weight="bold" text-anchor="middle">R</text>
  <text x="88" y="540" fill="#333" font-size="10">Classifies each BND into an SV type using</text>
  <text x="88" y="552" fill="#333" font-size="10">orientation and coordinate criteria</text>

  <!-- Step 8 -->
  <circle cx="60" cy="578" r="13" fill="#3a6abd"/>
  <text x="60" y="583" fill="white" font-size="12" font-weight="bold" text-anchor="middle">8</text>
  <rect x="78" y="565" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="582" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">pre_procesado_GRIDSS.py</text>
  <text x="88" y="600" fill="#333" font-size="10">• Adds detected SV types to original BED</text>
  <text x="88" y="612" fill="#333" font-size="10">• Removes one record per breakend pair</text>
  <text x="88" y="624" fill="#333" font-size="10">• Computes VAF from INFO (GRIDSS has no GT)</text>

  <!-- Step 9 -->
  <circle cx="60" cy="648" r="13" fill="#3a6abd"/>
  <text x="60" y="653" fill="white" font-size="12" font-weight="bold" text-anchor="middle">9</text>
  <rect x="78" y="635" width="178" height="24" rx="5" fill="#b8d9b0"/>
  <text x="167" y="652" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">separar_portiposG.py</text>
  <text x="88" y="670" fill="#333" font-size="10">Splits formatted BED (step 8) into BED files</text>
  <text x="88" y="682" fill="#333" font-size="10">by classified SV type</text>

  <!-- Connector line between steps -->
  <line x1="60" y1="208" x2="60" y2="245" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="271" x2="60" y2="295" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="321" x2="60" y2="345" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="371" x2="60" y2="395" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="421" x2="60" y2="457" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="483" x2="60" y2="505" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="531" x2="60" y2="565" stroke="#3a6abd" stroke-width="1.5"/>
  <line x1="60" y1="591" x2="60" y2="635" stroke="#3a6abd" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════
       CENTER MERGE LABEL + ARROW
  ════════════════════════════════════════════════ -->
  <rect x="435" y="85" width="28" height="630" rx="5" fill="#e8a060"/>
  <text x="449" y="400" fill="white" font-size="13" font-weight="bold" text-anchor="middle" transform="rotate(-90,449,400)">MERGE (FUSION)</text>

  <!-- Step 10 circle -->
  <circle cx="449" cy="75" r="18" fill="#e8a060"/>
  <text x="449" y="81" fill="white" font-size="14" font-weight="bold" text-anchor="middle">10</text>

  <!-- ═══════════════════════════════════════════════
       RIGHT PANEL — MERGE
  ════════════════════════════════════════════════ -->

  <!-- merge.sh -->
  <rect x="475" y="90" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="540" y="109" fill="#2d6e2d" font-size="13" font-weight="bold" text-anchor="middle">merge.sh</text>

  <!-- SV type dirs created -->
  <rect x="615" y="82" width="200" height="44" rx="6" fill="#f0e8d0" stroke="#c8a070" stroke-width="1"/>
  <text x="715" y="99" fill="#5a4500" font-size="10" text-anchor="middle">SV type directories created</text>
  <text x="715" y="113" fill="#5a4500" font-size="10" text-anchor="middle">in the input directory</text>

  <!-- Type boxes -->
  <rect x="820" y="82" width="46" height="22" rx="4" fill="#c8a86e"/>
  <text x="843" y="97" fill="white" font-size="11" font-weight="bold" text-anchor="middle">DEL</text>
  <rect x="872" y="82" width="46" height="22" rx="4" fill="#c8a86e"/>
  <text x="895" y="97" fill="white" font-size="11" font-weight="bold" text-anchor="middle">TRA</text>
  <rect x="820" y="108" width="46" height="22" rx="4" fill="#c8a86e"/>
  <text x="843" y="123" fill="white" font-size="11" font-weight="bold" text-anchor="middle">INS</text>
  <rect x="872" y="108" width="46" height="22" rx="4" fill="#c8a86e"/>
  <text x="895" y="123" fill="white" font-size="11" font-weight="bold" text-anchor="middle">DUP</text>
  <rect x="846" y="134" width="46" height="22" rx="4" fill="#c8a86e"/>
  <text x="869" y="149" fill="white" font-size="11" font-weight="bold" text-anchor="middle">INV</text>

  <!-- split_gt.py -->
  <rect x="475" y="160" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="540" y="179" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">split_gt.py</text>
  <text x="620" y="167" fill="#333" font-size="10">Splits each SV type from each caller by</text>
  <text x="620" y="179" fill="#333" font-size="10">genotype (0/1; 1/1); added to two files:</text>
  <text x="620" y="191" fill="#333" font-size="10">*GRIDSS added to both (no genotype field)</text>

  <!-- homo/het file icons -->
  <rect x="970" y="155" width="90" height="20" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="1015" y="169" fill="#333" font-size="10" text-anchor="middle">homo.bed  1/1</text>
  <rect x="970" y="180" width="90" height="20" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="1015" y="194" fill="#333" font-size="10" text-anchor="middle">het.bed    0/1</text>
  <text x="940" y="162" fill="#555" font-size="9" text-anchor="end">Each SV</text>
  <text x="940" y="172" fill="#555" font-size="9" text-anchor="end">type folder</text>

  <!-- bedtools sort + merge box -->
  <rect x="475" y="215" width="210" height="54" rx="6" fill="#d0e8d0" stroke="#6aaa6a" stroke-width="1.5"/>
  <text x="490" y="233" fill="#2d6e2d" font-size="12" font-weight="bold">• bedtools sort -i</text>
  <text x="490" y="251" fill="#2d6e2d" font-size="12" font-weight="bold">• bedtools merge -c 12 -o collapse</text>

  <!-- bedtools explanation -->
  <text x="697" y="227" fill="#333" font-size="10">• Sorts all variants by coordinate for each GT</text>
  <text x="697" y="240" fill="#333" font-size="10">• bedtools merge identifies overlapping variants</text>
  <text x="697" y="253" fill="#333" font-size="10">  across callers</text>

  <!-- sorted/collapsed arrows -->
  <line x1="930" y1="200" x2="960" y2="220" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="960" y="218" width="110" height="18" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="1015" y="231" fill="#333" font-size="9" text-anchor="middle">homo.sorted.bed</text>
  <rect x="960" y="238" width="110" height="18" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="1015" y="251" fill="#333" font-size="9" text-anchor="middle">het.sorted.bed</text>
  <rect x="960" y="260" width="110" height="18" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="1015" y="273" fill="#333" font-size="9" text-anchor="middle">homo.collapsed.bed</text>
  <rect x="960" y="280" width="110" height="18" rx="3" fill="#e8e8e8" stroke="#aaa" stroke-width="1"/>
  <text x="1015" y="293" fill="#333" font-size="9" text-anchor="middle">het.collapsed.bed</text>

  <!-- del_merge / inv_merge blue dashed box -->
  <rect x="472" y="283" width="215" height="82" rx="6" fill="#ddeeff" stroke="#5588cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="478" y="292" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="543" y="311" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">del_merge.py</text>
  <rect x="478" y="328" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="543" y="347" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">inv_merge.py</text>

  <!-- Blue box label -->
  <rect x="690" y="283" width="288" height="50" rx="6" fill="#aaddff" stroke="#5588cc" stroke-width="1.5"/>
  <text x="834" y="300" fill="#003377" font-size="11" font-weight="bold" text-anchor="middle">PROCESS ONLY FOR SV TYPES</text>
  <text x="834" y="316" fill="#003377" font-size="11" font-weight="bold" text-anchor="middle">TREATED AS DELETIONS</text>
  <text x="834" y="330" fill="#003377" font-size="10" text-anchor="middle">(use bedtools sort + merge)</text>

  <!-- Use previous files text -->
  <text x="618" y="299" fill="#333" font-size="10">Use files from previous step</text>
  <text x="618" y="311" fill="#333" font-size="10">to build a DataFrame in final</text>
  <text x="618" y="323" fill="#333" font-size="10">format (*)</text>

  <!-- dup_merge -->
  <rect x="475" y="378" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="540" y="397" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">dup_merge.py</text>

  <!-- tra_merge -->
  <rect x="475" y="430" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="540" y="449" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">tra_merge.py</text>

  <!-- ins_merge -->
  <rect x="475" y="482" width="130" height="28" rx="6" fill="#b8d9b0"/>
  <text x="540" y="501" fill="#2d6e2d" font-size="12" font-weight="bold" text-anchor="middle">ins_merge.py</text>

  <!-- dup/tra/ins explanation -->
  <text x="618" y="440" fill="#333" font-size="10">Use homo.bed and het.bed to build a DataFrame</text>
  <text x="618" y="453" fill="#333" font-size="10">in final format (*), grouping variants by</text>
  <text x="618" y="466" fill="#333" font-size="10">chr–start–end.</text>

  <!-- Final consolidation text -->
  <text x="475" y="535" fill="#333" font-size="10">All SV type directories are scanned for files produced by the</text>
  <text x="475" y="548" fill="#333" font-size="10">*_merge.py scripts and concatenated into a single output file</text>
  <text x="475" y="561" fill="#333" font-size="10">placed in the input directory.</text>

  <!-- /dir_entrada diagram -->
  <rect x="900" y="420" width="100" height="120" rx="6" fill="#e8d8b0" stroke="#c8a070" stroke-width="1.5"/>
  <text x="950" y="440" fill="#5a4500" font-size="10" font-weight="bold" text-anchor="middle">/input_dir</text>
  <!-- small folder icons -->
  <rect x="910" y="448" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="928" y="459" fill="white" font-size="8" text-anchor="middle">Manta</text>
  <rect x="955" y="448" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="973" y="459" fill="white" font-size="8" text-anchor="middle">DEL</text>
  <rect x="910" y="468" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="928" y="479" fill="white" font-size="8" text-anchor="middle">delly</text>
  <rect x="955" y="468" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="973" y="479" fill="white" font-size="8" text-anchor="middle">INS</text>
  <rect x="910" y="488" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="928" y="499" fill="white" font-size="8" text-anchor="middle">GRIDSS</text>
  <rect x="955" y="488" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="973" y="499" fill="white" font-size="8" text-anchor="middle">INV</text>
  <rect x="955" y="508" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="973" y="519" fill="white" font-size="8" text-anchor="middle">TRA</text>
  <rect x="955" y="528" width="36" height="14" rx="2" fill="#c8a86e"/>
  <text x="973" y="539" fill="white" font-size="8" text-anchor="middle">DUP</text>
  <!-- arrow to final file -->
  <line x1="1000" y1="485" x2="1030" y2="510" stroke="#e8724a" stroke-width="2" marker-end="url(#arrorange)"/>
  <rect x="1030" y="500" width="130" height="26" rx="5" fill="#f87060" stroke="#d04030" stroke-width="1.5"/>
  <text x="1095" y="517" fill="white" font-size="11" font-weight="bold" text-anchor="middle">*_SV_merged.bed</text>

  <!-- ═══════════════════════════════════════════════
       FINAL OUTPUT HEADER
  ════════════════════════════════════════════════ -->
  <!-- Pink label -->
  <rect x="475" y="590" width="280" height="26" rx="8" fill="#f87060"/>
  <text x="615" y="607" fill="white" font-size="12" font-weight="bold" text-anchor="middle">* FINAL OUTPUT FILE HEADER</text>

  <rect x="475" y="622" width="880" height="80" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="641" fill="#1a1a1a" font-size="11" font-weight="bold">#chr  |  start  |  end  |  ID_PROGRAM  |  SVTYPE  |  merged_len  |  N_programs  |</text>
  <text x="490" y="659" fill="#1a1a1a" font-size="11" font-weight="bold">Programs  |  GT_MD  |  G_overlap  |  G_Total_overlap  |  G_overlap_INFO  |  G_coord  |</text>
  <text x="490" y="677" fill="#1a1a1a" font-size="11" font-weight="bold">GRIDSS_VAF  |  D_overlap  |  D_Total_overlap  |  D_overlap_INFO  |  D_coord  |</text>
  <text x="490" y="695" fill="#1a1a1a" font-size="11" font-weight="bold">M_overlap  |  M_Total_overlap  |  M_overlap_INFO  |  M_coord</text>

  <!-- ═══════════════════════════════════════════════
       ARROW MARKERS
  ════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arrorange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8724a"/>
    </marker>
  </defs>

</svg>
